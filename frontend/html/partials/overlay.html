<!-- Add card modal. Other overlays live in frontend/html/partials/modals/*.html. -->
<transition name="fade">
    <div v-if="showAddCardModal"
         class="fixed inset-0 z-[60] flex items-center justify-center bg-black bg-opacity-95 backdrop-blur p-4">
        <div class="bg-gray-900 rounded-xl w-full max-w-3xl border border-gray-700 shadow-2xl overflow-hidden flex flex-col max-h-[90vh]"
             @click.stop>
            <div class="p-4 border-b border-gray-700 bg-gray-800 flex justify-between items-center">
                <h2 class="text-xl font-bold text-white">
                    <i class="fa-solid fa-plus-circle mr-2 text-green-400"></i>Add Card
                </h2>
                <button @click="showAddCardModal = false" class="text-gray-400 hover:text-white">
                    <i class="fa-solid fa-times fa-lg"></i>
                </button>
            </div>

            <div class="flex border-b border-gray-700 bg-gray-850">
                <button @click="addCardMode = 'new'"
                        :class="addCardMode === 'new' ? 'border-b-2 border-green-500 text-green-400' : 'text-gray-400 hover:text-white'"
                        class="flex-1 py-3 text-sm font-bold transition">
                    New card
                </button>
                <button @click="addCardMode = 'variant'"
                        :class="addCardMode === 'variant' ? 'border-b-2 border-green-500 text-green-400' : 'text-gray-400 hover:text-white'"
                        class="flex-1 py-3 text-sm font-bold transition">
                    Variant / reprint
                </button>
            </div>

            <div class="p-6 overflow-y-auto custom-scroll flex-1 space-y-5">
                <div v-if="addCardMode === 'new'" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="block">
                            <span class="block text-gray-400 text-xs font-bold mb-1">Name</span>
                            <input v-model="newCardData.name"
                                   type="text"
                                   class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-green-500 outline-none"
                                   placeholder="Card name">
                        </label>
                        <label class="block">
                            <span class="block text-gray-400 text-xs font-bold mb-1">Card ID</span>
                            <input v-model="newCardData.id"
                                   type="text"
                                   class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-green-500 outline-none"
                                   placeholder="SV1a-001">
                        </label>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="block">
                            <span class="block text-gray-400 text-xs font-bold mb-1">Type</span>
                            <select v-model="newCardData.type"
                                    class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-green-500 outline-none">
                                <option value="Pok矇mon">Pokemon</option>
                                <option value="Trainer">Trainer</option>
                                <option value="Energy">Energy</option>
                            </select>
                        </label>
                        <label class="block">
                            <span class="block text-gray-400 text-xs font-bold mb-1">Subtype</span>
                            <input v-model="newCardData.subType"
                                   type="text"
                                   class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-green-500 outline-none"
                                   placeholder="Basic, Stage 1, Item...">
                        </label>
                    </div>

                    <div v-if="newCardData.type === 'Pok矇mon'" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="block">
                            <span class="block text-gray-400 text-xs font-bold mb-1">HP</span>
                            <input v-model="newCardData.hp"
                                   type="number"
                                   class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-green-500 outline-none">
                        </label>
                        <label class="block">
                            <span class="block text-gray-400 text-xs font-bold mb-1">Element</span>
                            <select v-model="newCardData.element"
                                    class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-green-500 outline-none">
                                <option value="Grass">Grass</option>
                                <option value="Fire">Fire</option>
                                <option value="Water">Water</option>
                                <option value="Lightning">Lightning</option>
                                <option value="Psychic">Psychic</option>
                                <option value="Fighting">Fighting</option>
                                <option value="Darkness">Darkness</option>
                                <option value="Metal">Metal</option>
                                <option value="Dragon">Dragon</option>
                                <option value="Colorless">Colorless</option>
                            </select>
                        </label>
                    </div>

                    <div class="bg-gray-850 border border-gray-700 rounded-lg p-4 space-y-3">
                        <div class="flex items-center justify-between gap-3">
                            <h3 class="text-sm font-bold text-gray-200">Skills / text</h3>
                            <button @click="addSkill"
                                    class="text-xs bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded">
                                <i class="fa-solid fa-plus mr-1"></i>Add line
                            </button>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button @click="addRuleBox('ex')" class="text-[11px] px-2 py-1 rounded bg-gray-800 hover:bg-gray-700 border border-gray-700">ex rule</button>
                            <button @click="addRuleBox('V')" class="text-[11px] px-2 py-1 rounded bg-gray-800 hover:bg-gray-700 border border-gray-700">V rule</button>
                            <button @click="addRuleBox('VMAX')" class="text-[11px] px-2 py-1 rounded bg-gray-800 hover:bg-gray-700 border border-gray-700">VMAX rule</button>
                            <button @click="addRuleBox('VSTAR')" class="text-[11px] px-2 py-1 rounded bg-gray-800 hover:bg-gray-700 border border-gray-700">VSTAR rule</button>
                            <button @click="addRuleBox('ACE SPEC')" class="text-[11px] px-2 py-1 rounded bg-gray-800 hover:bg-gray-700 border border-gray-700">ACE SPEC</button>
                        </div>
                        <div v-for="(skill, idx) in newCardData.skills"
                             :key="idx"
                             class="bg-gray-900 border border-gray-700 rounded p-3 space-y-2">
                            <div class="grid grid-cols-1 md:grid-cols-[1fr_90px_auto] gap-2 items-center">
                                <input v-model="skill.name"
                                       type="text"
                                       class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white text-sm outline-none focus:border-green-500"
                                       placeholder="Name / ability">
                                <input v-model="skill.damage"
                                       type="text"
                                       class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white text-sm outline-none focus:border-green-500"
                                       placeholder="Damage">
                                <label class="flex items-center gap-2 text-xs text-gray-300">
                                    <input type="checkbox" v-model="skill.isAbility" class="rounded bg-gray-700 border-gray-500">
                                    Ability
                                </label>
                            </div>
                            <textarea v-model="skill.effect"
                                      rows="2"
                                      class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white text-sm outline-none resize-none focus:border-green-500"
                                      placeholder="Effect text"></textarea>
                            <div class="flex items-center justify-between gap-3">
                                <div class="flex flex-wrap items-center gap-1">
                                    <span class="text-xs text-gray-500 mr-1">Cost</span>
                                    <button v-for="energy in ['Grass','Fire','Water','Lightning','Psychic','Fighting','Darkness','Metal','Colorless']"
                                            :key="energy"
                                            @click="addSkillCost(idx, energy)"
                                            class="w-6 h-6 rounded bg-gray-800 hover:bg-gray-700 border border-gray-700 flex items-center justify-center"
                                            :title="energy">
                                        <img :src="getEnergyIcon(energy)" class="w-4 h-4">
                                    </button>
                                    <button @click="removeLastSkillCost(idx)"
                                            class="w-6 h-6 rounded bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-400"
                                            title="Remove last cost">
                                        <i class="fa-solid fa-delete-left text-xs"></i>
                                    </button>
                                    <span class="ml-2 flex">
                                        <img v-for="(energy, costIdx) in skill.cost"
                                             :key="costIdx"
                                             :src="getEnergyIcon(energy)"
                                             class="w-4 h-4">
                                    </span>
                                </div>
                                <button @click="removeSkill(idx)"
                                        class="text-xs text-red-300 hover:text-red-200">
                                    Remove
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div v-else class="space-y-4">
                    <div class="bg-blue-900/20 border border-blue-800 rounded p-3 text-sm text-blue-200">
                        Search an existing card and upload a new image or card number as a variant.
                    </div>
                    <label class="block relative">
                        <span class="block text-gray-400 text-xs font-bold mb-1">Source card</span>
                        <div class="flex">
                            <input v-model="sourceSearchQuery"
                                   @keyup.enter="searchSourceCard"
                                   type="text"
                                   class="flex-1 bg-gray-800 border border-gray-600 rounded-l px-3 py-2 text-white focus:border-green-500 outline-none"
                                   placeholder="Search source card">
                            <button @click="searchSourceCard" class="bg-gray-700 hover:bg-gray-600 px-4 rounded-r border border-l-0 border-gray-600">
                                <i class="fa-solid fa-search"></i>
                            </button>
                        </div>
                        <div v-if="sourceSearchResults.length > 0"
                             class="absolute z-10 w-full bg-gray-800 border border-gray-600 mt-1 max-h-56 overflow-y-auto rounded shadow-xl">
                            <div v-for="card in sourceSearchResults"
                                 :key="card.card_id || card.id"
                                 @click.stop="selectSourceCard(card)"
                                 class="p-2 hover:bg-gray-700 cursor-pointer flex items-center border-b border-gray-700 last:border-0">
                                <img :src="card.image_url" class="w-8 h-10 object-contain bg-gray-900 mr-3">
                                <div class="min-w-0">
                                    <div class="font-bold text-sm truncate">[[ card.name ]]</div>
                                    <div class="text-xs text-gray-400 truncate">[[ card.card_id || card.id ]] | [[ card.card_type ]]</div>
                                </div>
                            </div>
                        </div>
                    </label>
                    <div v-if="newCardData.sourceCardId" class="bg-gray-800 border border-green-500/50 rounded p-3 flex items-center">
                        <i class="fa-solid fa-check-circle text-green-500 mr-3"></i>
                        <div class="min-w-0">
                            <div class="text-xs text-gray-400">Selected source</div>
                            <div class="font-bold text-green-400 truncate">[[ newCardData.sourceName ]]</div>
                        </div>
                        <button @click="newCardData.sourceCardId = ''; newCardData.sourceName = ''"
                                class="ml-auto text-gray-500 hover:text-white text-sm">
                            Clear
                        </button>
                    </div>
                    <label class="block">
                        <span class="block text-gray-400 text-xs font-bold mb-1">New card ID</span>
                        <input v-model="newCardData.id"
                               type="text"
                               class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-green-500 outline-none"
                               placeholder="SV4a-100">
                    </label>
                </div>

                <div class="pt-4 border-t border-gray-700">
                    <span class="block text-gray-400 text-xs font-bold mb-2">Card image</span>
                    <div class="flex items-center gap-4">
                        <label class="cursor-pointer bg-gray-800 hover:bg-gray-700 border border-gray-600 px-4 py-2 rounded transition flex items-center">
                            <i class="fa-solid fa-upload mr-2"></i>Upload image
                            <input type="file" @change="handleFileUpload" class="hidden" accept="image/*">
                        </label>
                        <span v-if="newCardData.imageFile" class="text-sm text-gray-300 truncate">[[ newCardData.imageFile.name ]]</span>
                    </div>
                    <div v-if="previewImage" class="mt-4 flex justify-center bg-gray-800 p-2 rounded border border-gray-700 border-dashed">
                        <img :src="previewImage" class="max-h-48 object-contain">
                    </div>
                </div>
            </div>

            <div class="p-4 border-t border-gray-700 bg-gray-800 flex justify-end">
                <button @click="showAddCardModal = false" class="px-4 py-2 text-gray-400 hover:text-white mr-2">
                    Cancel
                </button>
                <button @click="submitNewCard"
                        :disabled="isSubmittingCard"
                        class="bg-green-600 hover:bg-green-500 disabled:bg-gray-600 text-white px-6 py-2 rounded font-bold transition flex items-center">
                    <i v-if="isSubmittingCard" class="fa-solid fa-circle-notch fa-spin mr-2"></i>
                    [[ isSubmittingCard ? 'Saving...' : 'Save card' ]]
                </button>
            </div>
        </div>
    </div>
</transition>
