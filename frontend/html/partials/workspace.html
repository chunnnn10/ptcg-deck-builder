<section class="h-full flex flex-col bg-gray-850 select-none" @click="closeWsContextMenu">
    <div class="h-12 px-3 border-b border-gray-700 bg-gray-800 flex items-center justify-between">
        <div class="font-bold text-sm text-gray-100 flex items-center gap-2">
            <i class="fa-solid fa-folder-tree text-blue-300"></i>
            <span>Workspace</span>
        </div>
        <div class="flex items-center gap-1">
            <button @click="createNewFolder(null)"
                    class="w-8 h-8 rounded hover:bg-gray-700 text-gray-400 hover:text-white transition"
                    title="New Folder">
                <i class="fa-solid fa-folder-plus text-xs"></i>
            </button>
            <button @click="createNewDeck(null)"
                    class="w-8 h-8 rounded hover:bg-gray-700 text-gray-400 hover:text-white transition"
                    title="New Deck">
                <i class="fa-solid fa-file-circle-plus text-xs"></i>
            </button>
            <button @click="loadWorkspace"
                    class="w-8 h-8 rounded hover:bg-gray-700 text-gray-400 hover:text-white transition"
                    title="Refresh">
                <i class="fa-solid fa-refresh text-xs" :class="{'fa-spin': workspaceLoading}"></i>
            </button>
            <button @click="closeSidePanel"
                    class="md:hidden w-8 h-8 rounded hover:bg-gray-700 text-gray-400 hover:text-white transition"
                    title="Close">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <div class="flex-1 min-h-0 overflow-y-auto custom-scroll p-2"
         @dragover.prevent="handleWsDragOver($event, null)"
         @drop.prevent="handleWsDrop($event, null)">
        <div v-if="workspaceLoading && workspaceTree.length === 0" class="text-center py-8 text-gray-500">
            <i class="fa-solid fa-circle-notch fa-spin fa-lg"></i>
            <p class="text-xs mt-2">Loading workspace...</p>
        </div>

        <div v-else-if="workspaceTree.length === 0" class="text-center py-8 text-gray-500">
            <i class="fa-solid fa-folder-open fa-2x mb-2 opacity-30"></i>
            <p class="text-xs">No decks yet.</p>
            <button @click="createNewDeck(null)"
                    class="mt-3 text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded transition">
                <i class="fa-solid fa-plus mr-1"></i>New Deck
            </button>
        </div>

        <template v-else>
            <workspace-tree-node
                v-for="item in workspaceTree"
                :key="item.id"
                :item="item"
                :depth="0"
                :current-item="currentItem"
                :expanded-folders="expandedFolders"
                :has-unsaved-changes="hasUnsavedChanges"
                @toggle-folder="toggleFolder"
                @open-deck="openDeck"
                @context-menu="openWsContextMenu"
                @drag-start="handleWsDragStart"
                @drag-over="handleWsDragOver"
                @drop="handleWsDrop">
            </workspace-tree-node>
        </template>
    </div>

    <div v-if="currentItem && currentItem.type === 'deck'" class="border-t border-gray-700 bg-gray-850 max-h-56 flex flex-col">
        <div class="px-3 py-2 flex items-center justify-between text-xs text-gray-300">
            <div class="font-bold flex items-center gap-2">
                <i class="fa-solid fa-clock-rotate-left text-blue-300"></i>
                <span>Timeline</span>
            </div>
            <button @click.stop="loadTimeline"
                    class="w-7 h-7 hover:bg-gray-700 rounded text-gray-400 hover:text-white transition"
                    title="Reload Timeline">
                <i class="fa-solid fa-rotate text-[11px]" :class="{'fa-spin': timelineLoading}"></i>
            </button>
        </div>
        <div class="overflow-y-auto custom-scroll px-2 pb-2 space-y-1">
            <div v-if="timelineLoading && timelineEntries.length === 0" class="text-xs text-gray-500 px-2 py-3 text-center">
                Loading Timeline...
            </div>
            <div v-else-if="timelineEntries.length === 0" class="text-xs text-gray-500 px-2 py-3 text-center">
                No timeline entries.
            </div>
            <button v-for="entry in timelineEntries"
                    :key="entry.id"
                    @click.stop="restoreTimeline(entry)"
                    :disabled="timelineRestoring"
                    class="w-full text-left px-2 py-1.5 rounded hover:bg-gray-800 disabled:opacity-50 transition border-l border-gray-700 hover:border-blue-500">
                <div class="flex items-center justify-between gap-2">
                    <span class="text-xs text-gray-200 truncate">[[ entry.action || 'Update' ]]</span>
                    <span class="text-[10px] text-gray-500 shrink-0">[[ entry.card_count || 0 ]]</span>
                </div>
                <div class="text-[10px] text-gray-500 truncate">
                    [[ formatTimelineTime(entry.created_at) ]]
                </div>
            </button>
        </div>
    </div>

    <div class="p-2 border-t border-gray-700 bg-gray-800">
        <div v-if="currentItem" class="text-xs text-gray-400 mb-2 flex items-center justify-between gap-2">
            <span class="truncate flex-1" :title="currentItem.name">
                <i class="fa-solid fa-file-lines mr-1 text-green-400"></i>
                [[ currentItem.name ]]
            </span>
            <span v-if="hasUnsavedChanges" class="text-yellow-400" title="Unsaved">
                <i class="fa-solid fa-circle text-[8px]"></i>
            </span>
            <span v-else class="text-green-400" title="Saved">
                <i class="fa-solid fa-check text-xs"></i>
            </span>
        </div>
        <div class="flex gap-2">
            <button v-if="currentItem"
                    @click="saveCurrentDeck"
                    :disabled="!hasUnsavedChanges"
                    class="flex-1 text-xs py-1.5 rounded transition"
                    :class="hasUnsavedChanges ? 'bg-green-600 hover:bg-green-500 text-white' : 'bg-gray-700 text-gray-500 cursor-not-allowed'">
                <i class="fa-solid fa-save mr-1"></i>Save
            </button>
            <button v-if="deck.length > 0 && !currentItem"
                    @click="saveAsNewDeck(null)"
                    class="flex-1 text-xs bg-blue-600 hover:bg-blue-500 text-white py-1.5 rounded transition">
                <i class="fa-solid fa-folder-plus mr-1"></i>Save to Workspace
            </button>
        </div>
    </div>

    <div v-if="wsContextMenu.visible"
         class="fixed z-[100] bg-gray-800 border border-gray-600 rounded-lg shadow-xl py-1 min-w-[160px]"
         :style="{ left: wsContextMenu.x + 'px', top: wsContextMenu.y + 'px' }">
        <template v-if="wsContextMenu.item">
            <template v-if="wsContextMenu.item.type === 'deck'">
                <div @click="handleWsContextAction('open')" class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                    <i class="fa-solid fa-folder-open w-5 text-blue-400"></i>
                    <span>Open</span>
                </div>
                <div @click="handleWsContextAction('publish')" class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                    <i class="fa-solid fa-share-nodes w-5 text-green-400"></i>
                    <span>Publish</span>
                </div>
                <div class="border-t border-gray-700 my-1"></div>
            </template>
            <template v-if="wsContextMenu.item.type === 'folder'">
                <div @click="handleWsContextAction('open')" class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                    <i class="fa-solid fa-folder-open w-5 text-yellow-400"></i>
                    <span>Toggle</span>
                </div>
                <div @click="handleWsContextAction('newDeck')" class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                    <i class="fa-solid fa-file-circle-plus w-5 text-green-400"></i>
                    <span>New Deck</span>
                </div>
                <div @click="handleWsContextAction('newFolder')" class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                    <i class="fa-solid fa-folder-plus w-5 text-blue-400"></i>
                    <span>New Folder</span>
                </div>
                <div class="border-t border-gray-700 my-1"></div>
            </template>
            <div @click="handleWsContextAction('rename')" class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                <i class="fa-solid fa-pen w-5 text-gray-400"></i>
                <span>Rename</span>
            </div>
            <div @click="handleWsContextAction('delete')" class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center text-red-400">
                <i class="fa-solid fa-trash w-5"></i>
                <span>Delete</span>
            </div>
        </template>
        <template v-else>
            <div @click="handleWsContextAction('newDeck')" class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                <i class="fa-solid fa-file-circle-plus w-5 text-green-400"></i>
                <span>New Deck</span>
            </div>
            <div @click="handleWsContextAction('newFolder')" class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                <i class="fa-solid fa-folder-plus w-5 text-blue-400"></i>
                <span>New Folder</span>
            </div>
        </template>
    </div>

    <transition name="fade">
        <div v-if="wsModal.visible" class="fixed inset-0 z-[90] flex items-center justify-center bg-black bg-opacity-80 backdrop-blur p-4">
            <div class="bg-gray-800 rounded-xl w-full max-w-sm border border-gray-700 shadow-2xl p-5">
                <h3 class="text-lg font-bold text-white mb-4">
                    <template v-if="wsModal.mode === 'rename'">
                        <i class="fa-solid fa-pen mr-2 text-blue-400"></i>Rename
                    </template>
                    <template v-else-if="wsModal.type === 'folder'">
                        <i class="fa-solid fa-folder-plus mr-2 text-yellow-400"></i>New Folder
                    </template>
                    <template v-else>
                        <i class="fa-solid fa-file-circle-plus mr-2 text-green-400"></i>New Deck
                    </template>
                </h3>
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2">Name</label>
                    <input v-model="wsModal.name"
                           type="text"
                           class="w-full bg-gray-900 text-white border border-gray-600 rounded px-3 py-2 focus:border-blue-500 outline-none"
                           placeholder="Name"
                           @keyup.enter="submitWsModal">
                </div>
                <div class="flex justify-end gap-2">
                    <button @click="wsModal.visible = false" class="px-4 py-2 text-gray-400 hover:text-white transition">
                        Cancel
                    </button>
                    <button @click="submitWsModal" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-bold transition">
                        [[ wsModal.mode === 'rename' ? 'Save' : 'Create' ]]
                    </button>
                </div>
            </div>
        </div>
    </transition>
</section>
