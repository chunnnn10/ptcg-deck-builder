<!-- === 工作區側邊欄 === -->
<!-- 手機版遮罩 -->
<div v-if="isWorkspaceAvailable && workspaceVisible" 
     class="md:hidden fixed inset-0 z-40 bg-black bg-opacity-50 backdrop-blur-sm"
     @click="toggleWorkspace">
</div>

<aside v-if="isWorkspaceAvailable && workspaceVisible" 
       class="fixed inset-y-0 left-0 z-50 md:static w-64 bg-gray-850 border-r border-gray-700 flex flex-col overflow-hidden flex-shrink-0 select-none shadow-2xl md:shadow-none h-full"
       @click="closeWsContextMenu">
    
    <!-- 標題區 -->
    <div class="p-3 border-b border-gray-700 bg-gray-800 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-folder-tree text-blue-400"></i>
            <span class="font-bold text-sm text-gray-200">我的牌組</span>
        </div>
        <div class="flex items-center gap-1">
            <button @click="createNewFolder(null)" 
                    class="p-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-white transition"
                    title="新增資料夾">
                <i class="fa-solid fa-folder-plus text-xs"></i>
            </button>
            <button @click="createNewDeck(null)" 
                    class="p-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-white transition"
                    title="新增牌組">
                <i class="fa-solid fa-file-circle-plus text-xs"></i>
            </button>
            <button @click="loadWorkspace" 
                    class="p-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-white transition"
                    title="重新載入">
                <i class="fa-solid fa-refresh text-xs" :class="{'fa-spin': workspaceLoading}"></i>
            </button>
            <!-- 手機版關閉按鈕 -->
            <button @click="toggleWorkspace" 
                    class="md:hidden p-1.5 hover:bg-gray-700 rounded text-gray-400 hover:text-white transition ml-2">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
    </div>
    
    <!-- 工作區樹狀列表 -->
    <div class="flex-1 overflow-y-auto custom-scroll p-2"
         @dragover.prevent="handleWsDragOver($event, null)"
         @drop.prevent="handleWsDrop($event, null)">
        
        <!-- 載入中 -->
        <div v-if="workspaceLoading && workspaceTree.length === 0" class="text-center py-8 text-gray-500">
            <i class="fa-solid fa-circle-notch fa-spin fa-lg"></i>
            <p class="text-xs mt-2">載入中...</p>
        </div>
        
        <!-- 空狀態 -->
        <div v-else-if="workspaceTree.length === 0" class="text-center py-8 text-gray-500">
            <i class="fa-solid fa-folder-open fa-2x mb-2 opacity-30"></i>
            <p class="text-xs">尚無牌組</p>
            <button @click="createNewDeck(null)" 
                    class="mt-3 text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded transition">
                <i class="fa-solid fa-plus mr-1"></i>新增牌組
            </button>
        </div>
        
        <!-- 樹狀結構 -->
        <template v-else>
            <workspace-tree-node 
                v-for="item in workspaceTree" 
                :key="item.id"
                :item="item"
                :depth="0"
                :current-item="currentItem"
                :expanded-folders="expandedFolders"
                :has-unsaved-changes="hasUnsavedChanges"
                @toggle-folder="toggleFolder"
                @open-deck="openDeck"
                @context-menu="openWsContextMenu"
                @drag-start="handleWsDragStart"
                @drag-over="handleWsDragOver"
                @drop="handleWsDrop">
            </workspace-tree-node>
        </template>
    </div>
    
    <div v-if="currentItem && currentItem.type === 'deck'"
         class="border-t border-gray-700 bg-gray-850 max-h-56 flex flex-col">
        <div class="px-3 py-2 flex items-center justify-between text-xs text-gray-300">
            <div class="font-bold flex items-center gap-2">
                <i class="fa-solid fa-clock-rotate-left text-blue-400"></i>
                <span>Timeline</span>
            </div>
            <button @click.stop="loadTimeline"
                    class="p-1 hover:bg-gray-700 rounded text-gray-400 hover:text-white transition"
                    title="重新載入 Timeline">
                <i class="fa-solid fa-rotate text-[11px]" :class="{'fa-spin': timelineLoading}"></i>
            </button>
        </div>
        <div class="overflow-y-auto custom-scroll px-2 pb-2 space-y-1">
            <div v-if="timelineLoading && timelineEntries.length === 0"
                 class="text-xs text-gray-500 px-2 py-3 text-center">
                載入 Timeline...
            </div>
            <div v-else-if="timelineEntries.length === 0"
                 class="text-xs text-gray-500 px-2 py-3 text-center">
                尚無歷史快照
            </div>
            <button v-for="entry in timelineEntries"
                    :key="entry.id"
                    @click.stop="restoreTimeline(entry)"
                    :disabled="timelineRestoring"
                    class="w-full text-left px-2 py-1.5 rounded hover:bg-gray-800 disabled:opacity-50 transition group border-l border-gray-700 hover:border-blue-500">
                <div class="flex items-center justify-between gap-2">
                    <span class="text-xs text-gray-200 truncate">[[ entry.action || '編輯牌組' ]]</span>
                    <span class="text-[10px] text-gray-500 shrink-0">[[ entry.card_count || 0 ]]</span>
                </div>
                <div class="text-[10px] text-gray-500 truncate">
                    [[ formatTimelineTime(entry.created_at) ]]
                </div>
            </button>
        </div>
    </div>

    <!-- 底部操作區 -->
    <div class="p-2 border-t border-gray-700 bg-gray-800">
        <div v-if="currentItem" class="text-xs text-gray-400 mb-2 flex items-center justify-between">
            <span class="truncate flex-1" :title="currentItem.name">
                <i class="fa-solid fa-file-lines mr-1 text-green-400"></i>
                [[ currentItem.name ]]
            </span>
            <span v-if="hasUnsavedChanges" class="text-yellow-400 ml-2" title="有未儲存的變更">
                <i class="fa-solid fa-circle text-[8px]"></i>
            </span>
            <span v-else class="text-green-400 ml-2" title="已儲存">
                <i class="fa-solid fa-check text-xs"></i>
            </span>
        </div>
        <div class="flex gap-2">
            <button v-if="currentItem" 
                    @click="saveCurrentDeck" 
                    :disabled="!hasUnsavedChanges"
                    class="flex-1 text-xs py-1.5 rounded transition"
                    :class="hasUnsavedChanges ? 'bg-green-600 hover:bg-green-500 text-white' : 'bg-gray-700 text-gray-500 cursor-not-allowed'">
                <i class="fa-solid fa-save mr-1"></i>儲存
            </button>
            <button v-if="deck.length > 0 && !currentItem"
                    @click="saveAsNewDeck(null)"
                    class="flex-1 text-xs bg-blue-600 hover:bg-blue-500 text-white py-1.5 rounded transition">
                <i class="fa-solid fa-save mr-1"></i>儲存為新牌組
            </button>
        </div>
    </div>
</aside>

<!-- 側邊欄切換按鈕（收合時顯示） -->
<button v-if="isWorkspaceAvailable && !workspaceVisible"
        @click="toggleWorkspace"
        class="fixed left-0 top-1/2 -translate-y-1/2 z-30 bg-gray-800 hover:bg-gray-700 text-gray-300 p-2 rounded-r-lg border border-l-0 border-gray-600 shadow-lg transition">
    <i class="fa-solid fa-chevron-right"></i>
</button>

<!-- 收合按鈕（展開時顯示在側邊欄旁） -->
<button v-if="isWorkspaceAvailable && workspaceVisible"
        @click="toggleWorkspace"
        class="absolute left-64 top-1/2 -translate-y-1/2 z-30 bg-gray-800 hover:bg-gray-700 text-gray-300 p-1 rounded-r border border-l-0 border-gray-600 shadow transition opacity-0 hover:opacity-100"
        style="transition: opacity 0.2s;">
    <i class="fa-solid fa-chevron-left text-xs"></i>
</button>

<!-- 工作區右鍵選單 -->
<div v-if="wsContextMenu.visible" 
     class="fixed z-[100] bg-gray-800 border border-gray-600 rounded-lg shadow-xl py-1 min-w-[160px]"
     :style="{ left: wsContextMenu.x + 'px', top: wsContextMenu.y + 'px' }">
    
    <template v-if="wsContextMenu.item">
        <!-- 牌組選項 -->
        <template v-if="wsContextMenu.item.type === 'deck'">
            <div @click="handleWsContextAction('open')" 
                 class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                <i class="fa-solid fa-folder-open w-5 text-blue-400"></i>
                <span>開啟</span>
            </div>
            <div @click="handleWsContextAction('publish')" 
                 class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                <i class="fa-solid fa-share-nodes w-5 text-green-400"></i>
                <span>公開分享</span>
            </div>
            <div class="border-t border-gray-700 my-1"></div>
        </template>
        
        <!-- 資料夾選項 -->
        <template v-if="wsContextMenu.item.type === 'folder'">
            <div @click="handleWsContextAction('open')" 
                 class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                <i class="fa-solid fa-folder-open w-5 text-yellow-400"></i>
                <span>展開/收合</span>
            </div>
            <div @click="handleWsContextAction('newDeck')" 
                 class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                <i class="fa-solid fa-file-circle-plus w-5 text-green-400"></i>
                <span>新增牌組</span>
            </div>
            <div @click="handleWsContextAction('newFolder')" 
                 class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
                <i class="fa-solid fa-folder-plus w-5 text-blue-400"></i>
                <span>新增子資料夾</span>
            </div>
            <div class="border-t border-gray-700 my-1"></div>
        </template>
        
        <!-- 通用選項 -->
        <div @click="handleWsContextAction('rename')" 
             class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
            <i class="fa-solid fa-pen w-5 text-gray-400"></i>
            <span>重新命名</span>
        </div>
        <div @click="handleWsContextAction('delete')" 
             class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center text-red-400">
            <i class="fa-solid fa-trash w-5"></i>
            <span>刪除</span>
        </div>
    </template>
    
    <!-- 空白區域右鍵 -->
    <template v-else>
        <div @click="handleWsContextAction('newDeck')" 
             class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
            <i class="fa-solid fa-file-circle-plus w-5 text-green-400"></i>
            <span>新增牌組</span>
        </div>
        <div @click="handleWsContextAction('newFolder')" 
             class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm flex items-center">
            <i class="fa-solid fa-folder-plus w-5 text-blue-400"></i>
            <span>新增資料夾</span>
        </div>
    </template>
</div>

<!-- 工作區 Modal (新增/重新命名) -->
<transition name="fade">
    <div v-if="wsModal.visible" 
         class="fixed inset-0 z-[90] flex items-center justify-center bg-black bg-opacity-80 backdrop-blur p-4">
        <div class="bg-gray-800 rounded-xl w-full max-w-sm border border-gray-700 shadow-2xl p-5">
            <h3 class="text-lg font-bold text-white mb-4">
                <template v-if="wsModal.mode === 'rename'">
                    <i class="fa-solid fa-pen mr-2 text-blue-400"></i>重新命名
                </template>
                <template v-else-if="wsModal.type === 'folder'">
                    <i class="fa-solid fa-folder-plus mr-2 text-yellow-400"></i>新增資料夾
                </template>
                <template v-else>
                    <i class="fa-solid fa-file-circle-plus mr-2 text-green-400"></i>新增牌組
                </template>
            </h3>
            
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-2">名稱</label>
                <input v-model="wsModal.name" 
                       type="text" 
                       class="w-full bg-gray-900 text-white border border-gray-600 rounded px-3 py-2 focus:border-blue-500 outline-none"
                       :placeholder="wsModal.type === 'folder' ? '資料夾名稱' : '牌組名稱'"
                       @keyup.enter="submitWsModal"
                       ref="wsModalInput">
            </div>
            
            <div class="flex justify-end gap-2">
                <button @click="wsModal.visible = false" 
                        class="px-4 py-2 text-gray-400 hover:text-white transition">
                    取消
                </button>
                <button @click="submitWsModal" 
                        class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-bold transition">
                    [[ wsModal.mode === 'rename' ? '確認' : '建立' ]]
                </button>
            </div>
        </div>
    </div>
</transition>
